name: Log a reading
description: Record a peak flow meter reading
title: "Reading"
labels: ["reading"]
body:
  - type: markdown
    attributes:
      value: |
        Fill in today's readings. Three readings are expected per session — the highest of the three is recorded as your best.
  - type: input
    id: date
    attributes:
      label: Date
      description: Format YYYY-MM-DD
      placeholder: "YYYY-MM-DD (e.g. 2026-07-01)"
    validations:
      required: true
  - type: input
    id: time
    attributes:
      label: Time
      description: Format HH:MM (24-hour or 12-hour, paired with the AM/PM field below)
      placeholder: "07:15"
    validations:
      required: true
  - type: input
    id: period
    attributes:
      label: AM / PM
      description: Type AM or PM (not case-sensitive)
      placeholder: "AM"
    validations:
      required: true
  - type: input
    id: reading1
    attributes:
      label: Reading 1 (L/min)
      description: Plausible range is 60-800
      placeholder: "280"
    validations:
      required: true
  - type: input
    id: reading2
    attributes:
      label: Reading 2 (L/min)
      description: Plausible range is 60-800
      placeholder: "275"
    validations:
      required: true
  - type: input
    id: reading3
    attributes:
      label: Reading 3 (L/min)
      description: Plausible range is 60-800
      placeholder: "290"
    validations:
      required: true
  - type: input
    id: afterRescue
    attributes:
      label: Were the readings above taken after using a rescue inhaler?
      description: Type Yes or No (not case-sensitive). If yes, log a follow-up reading a few minutes later with this set to Yes to track the recheck.
      placeholder: "No"
    validations:
      required: true
  - type: input
    id: symptoms
    attributes:
      label: Symptoms
      description: 'Comma-separate any that apply: Cough, Wheeze, Nighttime awakening. Leave blank if none.'
      placeholder: "Cough, Wheeze"
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything else worth recording (activity, triggers, medication changes, etc.)
    validations:
      required: false
